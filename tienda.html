<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista de Tienda - FranquiDía</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-tienda { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: center;
        }
        .header-tienda h1 { margin: 0; font-size: 22px; color: #1a1a1a; }
        .week-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 15px; }
        
        .nav-btn { 
            background: #eee; border: none; padding: 10px 18px; border-radius: 10px; 
            cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.2s;
        }

        #cuadranteTable { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cuad-row { display: grid; border-bottom: 1px solid #eee; align-items: center; }
        .cuad-cell { padding: 12px 2px; text-align: center; border-left: 1px solid #f9f9f9; }
        .today-col { background: #fff9e6; }
        .cuad-emp { padding: 10px; font-weight: 600; font-size: 12px; background: #fafafa; color: #666; }
        
        /* Ajuste para que los nombres no se corten en móviles */
        .pill { font-size: 10px !important; padding: 4px 6px !important; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tienda">
        <h1 id="storeTitle">Cargando...</h1>
        <div class="week-nav">
            <button class="nav-btn" onclick="changeWeek(-7)">◀</button>
            <span id="weekLabel" style="font-weight: 500; font-size: 14px; color: #666;"></span>
            <button class="nav-btn" onclick="changeWeek(7)">▶</button>
        </div>
    </div>

    <div id="cuadranteTable">
        <div style="padding: 40px; text-align: center; color: #999;">Cargando cuadrante...</div>
    </div>
</div>

<script src="config.js"></script>
<script>
    // --- ESTADO GLOBAL ---
    let DATA = { turnos: [], empleados: [] };
    const params = new URLSearchParams(window.location.search);
    const activeStore = params.get('tienda');
    let currentWeekStart = params.get('start') ? new Date(params.get('start')) : getMonday(new Date());

    // --- CARGA DE DATOS (JSONP) ---
    function fetchJSONP(url) {
        return new Promise((resolve, reject) => {
            const cbName = 'cb_' + Date.now() + Math.floor(Math.random() * 1000);
            const script = document.createElement('script');
            window[cbName] = (data) => {
                delete window[cbName];
                document.head.removeChild(script);
                resolve(data);
            };
            script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
            script.onerror = () => {
                delete window[cbName];
                if(script.parentNode) document.head.removeChild(script);
                reject(new Error('Error de conexión'));
            };
            document.head.appendChild(script);
        });
    }

    async function init() {
        if (!activeStore) {
            document.getElementById('storeTitle').textContent = "Tienda no encontrada";
            return;
        }

        const cached = localStorage.getItem('franquidia_data');
        if (cached) {
            DATA = JSON.parse(cached);
            render();
        }

        try {
            const data = await fetchJSONP(CONFIG.SCRIPT_URL + '?action=getData');
            DATA = data;
            localStorage.setItem('franquidia_data', JSON.stringify(data));
            render();
        } catch (e) {
            console.error("Modo offline o error de red");
        }
    }

    // --- RENDERIZADO ---
    function render() {
        const days = weekDays(currentWeekStart);
        const hoy = new Date().toISOString().slice(0, 10);
        const nombresDias = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
        const gridCols = `90px repeat(7, 1fr)`;

        document.getElementById('storeTitle').textContent = "📍 " + activeStore;
        document.getElementById('weekLabel').textContent = `Semana del ${days[0].split('-')[2]} al ${days[6].split('-')[2]}`;

        // Leyenda
        let html = `
            <div style="display:flex; gap:8px; padding:12px; flex-wrap:wrap; background:#fff; border-bottom:1px solid #eee; justify-content:center; font-size:10px;">
                <div style="display:flex; align-items:center; gap:4px"><span class="pill pill-m">M</span> Mañana</div>
                <div style="display:flex; align-items:center; gap:4px"><span class="pill pill-t">T</span> Tarde</div>
                <div style="display:flex; align-items:center; gap:4px"><span class="pill pill-mt">MT</span> Partido</div>
                <div style="display:flex; align-items:center; gap:4px"><span class="pill pill-l">L</span> Libranza</div>
            </div>`;

        // Cabecera
        const colorTienda = (CONFIG.STORE_COLORS && CONFIG.STORE_COLORS[activeStore]) || '#dc3545';
        html += `
            <div style="display:grid; grid-template-columns:${gridCols}; background:${colorTienda}; color:white; padding:10px 0; font-weight:bold; font-size:11px; text-align:center;">
                <div>Horario</div>
                ${nombresDias.map(dia => `<div>${dia}</div>`).join('')}
            </div>`;

        // Filtrar y ordenar personas de la tienda
        const nombresUnicos = [...new Set(DATA.turnos
            .filter(t => t.tienda === activeStore && days.includes(t.fecha) && !['L', 'VAC', 'F', 'B'].includes(t.turno))
            .map(t => t.nombre))];

        let personas = nombresUnicos.map(nombre => {
            const turnos = DATA.turnos.filter(t => t.nombre === nombre && t.tienda === activeStore && days.includes(t.fecha));
            let prioridad = 3; 
            let etiqueta = 'Partido';
            if (turnos.some(t => t.turno === 'M')) { prioridad = 1; etiqueta = 'Mañana'; }
            else if (turnos.some(t => t.turno === 'T')) { prioridad = 2; etiqueta = 'Tarde'; }
            return { nombre, etiqueta, prioridad };
        }).sort((a, b) => a.prioridad - b.prioridad);

        // Filas
        personas.forEach(p => {
            const primerNombre = p.nombre.split(' ')[0];
            const celdas = days.map(d => {
                const t = DATA.turnos.find(turno => turno.nombre === p.nombre && turno.tienda === activeStore && turno.fecha === d);
                const val = t ? t.turno : 'L';
                const esInactivo = ['L', 'VAC', 'F', 'B'].includes(val);
                return `
                    <div class="cuad-cell ${d === hoy ? 'today-col' : ''}">
                        <span class="pill pill-${val.toLowerCase()}">
                            ${esInactivo ? '-' : primerNombre}
                        </span>
                    </div>`;
            }).join('');

            html += `
                <div class="cuad-row" style="grid-template-columns:${gridCols}">
                    <div class="cuad-emp">${p.etiqueta}</div>
                    ${celdas}
                </div>`;
        });

        document.getElementById('cuadranteTable').innerHTML = html || '<div style="padding:40px; text-align:center">No hay turnos.</div>';
    }

    // --- FUNCIONES DE APOYO ---
    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(d.setDate(diff));
        monday.setHours(0,0,0,0);
        return monday;
    }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function weekDays(monday) { return Array.from({length: 7}, (_, i) => addDays(monday, i).toISOString().slice(0, 10)); }
    function changeWeek(n) { currentWeekStart = addDays(currentWeekStart, n); render(); }

    window.onload = init;
</script>
</body>
</html>
